name: RUMS Frontend CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # STAGE 1 — Lint
  # ════════════════════════════════════════════════════════════════════════
  lint:
    name: PHP Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_mysql, openssl, curl, json
          coverage: none

      - name: Check PHP syntax (all files)
        run: |
          find . -name "*.php" \
            -not -path "./vendor/*" \
            -not -path "./.git/*" \
            | xargs -I{} php -l {}
          echo "✔ PHP syntax OK"

  # ════════════════════════════════════════════════════════════════════════
  # STAGE 2 — Security Scan
  # ════════════════════════════════════════════════════════════════════════
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none

      - name: Check for hardcoded secrets
        run: |
          # Fail if .env file was accidentally committed
          if git ls-files | grep -q "^\.env$"; then
            echo "ERROR: .env file is tracked by git!"
            exit 1
          fi
          echo "✔ No .env file committed"

      - name: Scan for dangerous PHP functions
        run: |
          # Warn on eval(), exec(), shell_exec(), system() usage
          FOUND=$(grep -rn --include="*.php" \
            -E "eval\s*\(|shell_exec\s*\(|exec\s*\(|system\s*\(|passthru\s*\(" \
            --exclude-dir=vendor . || true)
          if [ -n "$FOUND" ]; then
            echo "WARNING: Potentially dangerous functions found:"
            echo "$FOUND"
          else
            echo "✔ No dangerous PHP functions found"
          fi

  # ════════════════════════════════════════════════════════════════════════
  # STAGE 3 — Deploy (main branch only)
  # ════════════════════════════════════════════════════════════════════════
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: security
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production
      url: ${{ vars.APP_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.5
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          extensions: mbstring, pdo_mysql, openssl, curl, json
          coverage: none

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: >
            -avzr
            --delete
            --exclude='.git'
            --exclude='.github'
            --exclude='.env'
            --exclude='.env.example'
            --exclude='*.log'
            --exclude='storage/uploads/'
            --exclude='storage/documents/'
          path: ./
          remote_path: ${{ secrets.DEPLOY_PATH }}
          remote_host: ${{ secrets.SERVER_HOST }}
          remote_user: ${{ secrets.SERVER_USER }}
          remote_key: ${{ secrets.SSH_PRIVATE_KEY }}
          remote_port: ${{ secrets.SERVER_PORT || 22 }}

      - name: Write .env on server
        uses: appleboy/ssh-action@v1
        env:
          ENV_CONTENT: ${{ secrets.APP_ENV_FILE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: ENV_CONTENT
          script: |
            printf '%s' "$ENV_CONTENT" > "${{ secrets.DEPLOY_PATH }}/.env"
            chmod 640 "${{ secrets.DEPLOY_PATH }}/.env"
            echo "✔ .env written"

      - name: Reload web server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            echo "Reloading PHP-FPM and Nginx..."
            sudo systemctl reload php8.5-fpm
            sudo systemctl reload nginx
            echo "Deployment complete: $(date)"

      - name: Notify deployment success
        if: success()
        run: |
          echo "✔ RUMS Frontend deployed successfully to production"
          echo "Commit: ${{ github.sha }}"
          echo "By: ${{ github.actor }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "✗ Deployment FAILED"
          echo "Commit: ${{ github.sha }}"
          echo "Check the logs above for details."
