user  www-data;
worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Security headers
    add_header X-Frame-Options           "DENY"            always;
    add_header X-Content-Type-Options    "nosniff"         always;
    add_header X-XSS-Protection         "1; mode=block"   always;
    add_header Referrer-Policy          "strict-origin"    always;
    add_header Permissions-Policy       "geolocation=()"  always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    server_tokens off;
    sendfile      on;
    tcp_nopush    on;
    tcp_nodelay   on;
    keepalive_timeout 65;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" $request_time';
    access_log /var/log/nginx/access.log main;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # Upload size
    client_max_body_size 12M;

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.php index.html;

        charset utf-8;

        # ── Custom error pages ────────────────────────────────
        # Pass the HTTP status code as ?code=N so error.php can read it.
        # The =NNN preserves the original response code (no 302 redirect).
        error_page 400 =400 /errors/error.php?code=400;
        error_page 403 =403 /errors/error.php?code=403;
        error_page 404 =404 /errors/error.php?code=404;
        error_page 405 =405 /errors/error.php?code=405;
        error_page 429 =429 /errors/error.php?code=429;
        error_page 500 =500 /errors/error.php?code=500;
        error_page 502 =502 /errors/error.php?code=502;
        error_page 503 =503 /errors/error.php?code=503;
        error_page 504 =504 /errors/error.php?code=504;

        # ── Health check (no auth, fast) ──────────────────────
        location = /api/v1/health {
            try_files $uri /api/v1/index.php$is_args$args;
            fastcgi_pass unix:/var/run/php-fpm.sock;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root/api/v1/index.php;
        }

        # ── REST API — route all /api/v1/* to front controller ─
        location ~ ^/api/v[0-9]+ {
            try_files $uri /api/v1/index.php$is_args$args;
            fastcgi_pass unix:/var/run/php-fpm.sock;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root/api/v1/index.php;
            fastcgi_param REQUEST_URI     $request_uri;

            # API-specific timeouts
            fastcgi_read_timeout 60s;

            # CORS preflight handled by PHP (ApiResponse::init)
        }

        # ── M-Pesa callbacks (no CSRF) ────────────────────────
        location ~ ^/api/mpesa_ {
            try_files $uri $uri/ =404;
            fastcgi_pass unix:/var/run/php-fpm.sock;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }

        # ── PHP pages ─────────────────────────────────────────
        # Redirect requests with .php extension to clean URL
        rewrite ^/(.+?)\.php(.*) /$1$2 permanent;

        location / {
            try_files $uri $uri/ $uri.php$is_args$args /index.php$is_args$args;
        }

        location ~ \.php$ {
            fastcgi_pass unix:/var/run/php-fpm.sock;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PHP_VALUE "upload_max_filesize=10M \n post_max_size=12M";
            fastcgi_intercept_errors on;
            fastcgi_buffer_size 128k;
            fastcgi_buffers 8 256k;
        }

        # ── Static assets ─────────────────────────────────────
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # ── Block access to sensitive files ───────────────────
        location ~ /\.(env|git|htaccess) {
            deny all;
            return 404;
        }

        location ~ \.(sql|log|md|lock|json)$ {
            deny all;
            return 404;
        }

        # ── Block direct access to config/includes/services ───
        location ~* ^/(config|includes|services|database)/ {
            deny all;
            return 404;
        }
    }
}
